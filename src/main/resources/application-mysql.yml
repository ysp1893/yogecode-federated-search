# Excludes MongoDB configuration when using MySQL profile
spring:
  autoconfigure:
    exclude: 
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/federated_search_metadata?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root # Change this to your actual MySQL root password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
