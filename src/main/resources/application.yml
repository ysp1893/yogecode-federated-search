spring:
  application:
    name: federated-search
  profiles:
    active: h2

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

app:
  search:
    default-page-size: 20
    max-page-size: 100
    source-timeout-ms: 3000
